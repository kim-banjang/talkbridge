<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>TalkBridge v1.2 — 산출물 인덱스</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --main: #2563EB;
    --main-dark: #1d4ed8;
    --bg: #F7F8FA;
    --border: #E5E7EB;
    --text1: #111827;
    --text2: #4B5563;
    --text3: #9CA3AF;
    --r: 10px;
    --r-lg: 14px;
    --r-xl: 20px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 880px; margin: 0 auto; padding: 64px 28px 120px; }

  /* ── Brand ── */
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon { width: 44px; height: 44px; flex-shrink: 0; }
  .brand-name { font-size: 24px; font-weight: 800; letter-spacing: -0.6px; color: var(--text1); }
  .brand-ver { font-size: 13px; font-weight: 600; color: var(--main); margin-left: 2px; }
  .lead { margin-top: 14px; font-size: 15px; line-height: 1.7; color: var(--text2); }
  .lead b { color: var(--text1); font-weight: 700; }

  .divider { height: 1px; background: var(--border); margin: 36px 0 32px; }

  .sec-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    color: var(--main); text-transform: uppercase; margin-bottom: 18px;
  }

  /* ── Cards ── */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px){ .cards { grid-template-columns: 1fr; } }

  .card {
    display: flex; flex-direction: column; gap: 10px;
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 22px 22px 20px;
    text-decoration: none; color: inherit;
    transition: border-color .15s, box-shadow .15s, transform .15s;
  }
  .card:hover {
    border-color: var(--main);
    box-shadow: 0 10px 26px rgba(37,99,235,0.13);
    transform: translateY(-2px);
  }
  .card-top { display: flex; align-items: center; gap: 10px; }
  .card-ic { width: 26px; height: 26px; flex-shrink: 0; color: var(--main); }
  .card-title { font-size: 16px; font-weight: 700; color: var(--text1); }
  .card-desc { font-size: 13px; line-height: 1.6; color: var(--text2); flex: 1; }
  .card-open {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 600; color: var(--main); margin-top: 2px;
  }
  .card-open svg { width: 14px; height: 14px; }
  .card.primary { background: #F5F8FF; border-color: #D6E2FF; }

  /* ── Last Update ── */
  .lastupd {
    position: fixed; bottom: 24px; left: 24px;
    font-size: 11px; color: var(--text3);
    background: rgba(255,255,255,0.85); backdrop-filter: blur(4px);
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 99px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <!-- 단색 라인아트 워드마크 아이콘: 두 대화 버블을 잇는 다리 -->
      <svg class="brand-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="TalkBridge">
        <rect x="3" y="8" width="19" height="14" rx="4" stroke="#2563EB" stroke-width="2.4"/>
        <path d="M9 22 L9 27 L15 22" stroke="#2563EB" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="26" y="20" width="19" height="14" rx="4" stroke="#2563EB" stroke-width="2.4"/>
        <path d="M39 34 L39 39 L33 34" stroke="#2563EB" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 15 H28" stroke="#2563EB" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="0.5 5"/>
      </svg>
      <div>
        <span class="brand-name">TalkBridge</span><span class="brand-ver">v1.2</span>
      </div>
    </div>

    <p class="lead">
      카카오톡 대화를 AI가 읽고 상대의 의도를 분석해 <b>다음 한 수</b>를 제안하는 대화 코파일럿.
      아래는 v1.2 <b>구상 단계 산출물(시안)</b>입니다. 확정본이 아니니 인수인계서부터 보시면 됩니다.
    </p>

    <div class="divider"></div>

    <div class="sec-label">구상 단계 산출물 (시안)</div>

    <div class="cards">
      <a class="card primary" href="TalkBridge-v1_2-Handover.html">
        <div class="card-top">
          <svg class="card-ic" viewBox="0 0 24 24" fill="none"><path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M14 3v5h5M8 13h8M8 17h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="card-title">인수인계서</span>
        </div>
        <div class="card-desc">프로젝트 배경·구상·다음 할 일 전부 (미확정)</div>
        <span class="card-open">바로 열기
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>

      <a class="card" href="TalkBridge-v1_2-Interactive.html">
        <div class="card-top">
          <svg class="card-ic" viewBox="0 0 24 24" fill="none"><rect x="6" y="2.5" width="12" height="19" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M10.5 18.5h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="15" cy="11" r="1" fill="currentColor"/></svg>
          <span class="card-title">Interactive</span>
        </div>
        <div class="card-desc">눌러볼 수 있는 화면 시안</div>
        <span class="card-open">바로 열기
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>

      <a class="card" href="TalkBridge-v1_2-Storyboard.html">
        <div class="card-top">
          <svg class="card-ic" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="7" height="14" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="5" width="7" height="14" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg>
          <span class="card-title">Storyboard</span>
        </div>
        <div class="card-desc">화면별 기능 설명서</div>
        <span class="card-open">바로 열기
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>

      <a class="card" href="TalkBridge-v1_2-Screenflow.html">
        <div class="card-top">
          <svg class="card-ic" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="7" height="6" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="14" width="7" height="6" rx="1.5" stroke="currentColor" stroke-width="1.8"/><path d="M10 7h4a3.5 3.5 0 0 1 3.5 3.5V14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="card-title">Screenflow</span>
        </div>
        <div class="card-desc">화면 흐름도</div>
        <span class="card-open">바로 열기
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>
    </div>
  </div>

  <div class="lastupd">Last Update 2026-06-11 17:43 (KST)</div>
</body>
</html>
